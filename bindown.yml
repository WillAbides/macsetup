systems:
  - darwin/amd64
  - darwin/arm64
  - linux/amd64
dependencies:
  direnv:
    template: direnv
    vars:
      version: 2.28.0
  gitstatus:
    template: gitstatus
    vars:
      version: 1.5.2
  shellcheck:
    template: origin#shellcheck
    vars:
      version: 0.11.0
  shfmt:
    template: shfmt
    vars:
      version: 3.13.0
templates:
  direnv:
    url: https://github.com/direnv/direnv/releases/download/v{{.version}}/direnv.{{.os}}-{{.arch}}
    archive_path: direnv.{{.os}}-{{.arch}}
    bin: direnv
    required_vars:
      - version
  gitstatus:
    url: https://github.com/romkatv/gitstatus/archive/refs/tags/v{{.version}}.tar.gz
    archive_path: gitstatus-{{.version}}
    link: true
    required_vars:
      - version
  origin#shellcheck:
    homepage: https://www.shellcheck.net
    description: ShellCheck, a static analysis tool for shell scripts
    url: https://github.com/koalaman/shellcheck/releases/download/v{{.version}}/shellcheck-v{{.version}}.{{.os}}.{{.arch}}{{.urlSuffix}}
    archive_path: shellcheck-v{{.version}}/shellcheck{{.archivePathSuffix}}
    bin: shellcheck
    vars:
      archivePathSuffix: ""
      urlSuffix: .tar.xz
    overrides:
      - matcher:
          os:
            - windows
        dependency:
          url: https://github.com/koalaman/shellcheck/releases/download/v{{.version}}/shellcheck-v{{.version}}.zip
          archive_path: shellcheck.exe
      - matcher:
          arch:
            - arm64
          os:
            - darwin
        dependency:
          substitutions:
            arch:
              arm64: aarch64
    substitutions:
      arch:
        amd64: x86_64
        arm: armv6hf
        arm64: aarch64
    systems:
      - darwin/amd64
      - darwin/arm64
      - linux/amd64
      - linux/arm
      - linux/arm64
      - windows/amd64
    required_vars:
      - version
  shfmt:
    homepage: https://pkg.go.dev/mvdan.cc/sh/v3
    description: A shell parser, formatter, and interpreter with bash and zsh support; includes shfmt
    url: https://github.com/mvdan/sh/releases/download/v{{.version}}/shfmt_v{{.version}}_{{.os}}_{{.arch}}{{.urlSuffix}}
    archive_path: shfmt_v{{.version}}_{{.os}}_{{.arch}}{{.urlSuffix}}
    bin: shfmt
    vars:
      archivePathSuffix: ""
      urlSuffix: ""
    systems:
      - darwin/amd64
      - darwin/arm64
      - linux/amd64
    required_vars:
      - version
template_sources:
  origin: https://raw.githubusercontent.com/WillAbides/bindown-templates/master/bindown.yml
